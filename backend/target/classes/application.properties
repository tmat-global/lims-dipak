# ═══════════════════════════════════════════════════════
#  MAT Global LIMS — Application Configuration
# ═══════════════════════════════════════════════════════

# Server
server.port=8081
server.servlet.context-path=/api

# Database — PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/matglobal_lims
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=MAT_GLOBAL_LIMS_JWT_SECRET_KEY_2024_CHANGE_IN_PRODUCTION_MIN_256_BITS
app.jwt.expiration-ms=86400000

# CORS — allow frontend
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500,null

# Registration Number seed
app.reg.start-number=300001

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads

# Logging
logging.level.com.matglobal=INFO
logging.level.org.springframework.security=WARN
