server.port=8081
server.servlet.context-path=/api

# ── SQL Server Connection ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=matglobal_lims;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Admin@1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Schema Init ───────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.matglobal=DEBUG
logging.level.org.springframework.security=DEBUG

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=MAT_GLOBAL_LIMS_JWT_SECRET_KEY_2024_CHANGE_IN_PRODUCTION_MIN_256_BITS
app.jwt.expiration-ms=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:8081,http://localhost:3000,http://127.0.0.1:5500,null

# ── Registration ──────────────────────────────────────────────────────────────
app.reg.start-number=300001

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads