server.port=8081
server.servlet.context-path=/api

spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=matglobal_lims;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Admin@1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

logging.level.org.hibernate.SQL=WARN
logging.level.com.matglobal=INFO
logging.level.org.springframework.security=WARN

app.jwt.secret=MAT_GLOBAL_LIMS_JWT_SECRET_KEY_2024_CHANGE_IN_PRODUCTION_MIN_256_BITS
app.jwt.expiration-ms=86400000

app.cors.allowed-origins=http://localhost:8081,http://localhost:3000,http://127.0.0.1:5500,null

app.reg.start-number=300001

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads
