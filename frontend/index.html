<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MAT Global LIS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:#1e293b;font-size:13px}
:root{
  --sidebar:#0f2044;
  --sidebar-hover:#1a3460;
  --sidebar-active:#1e4080;
  --topbar-from:#1a56db;
  --topbar-to:#0e3a9e;
  --accent:#2563eb;
  --accent-light:#dbeafe;
  --thead:#1a56db;
  --row-alt:#eff6ff;
  --row-hover:#dbeafe;
  --green:#16a34a;--red:#dc2626;--orange:#ea580c;--yellow:#ca8a04;
  --purple:#7c3aed;--cyan:#0891b2;--pink:#db2777;
  --gray:#64748b;--white:#fff;
  --border:#e2e8f0;--surface:#fff;
  --text:#1e293b;--muted:#64748b;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:230px;min-width:230px;background:var(--sidebar);display:flex;flex-direction:column;transition:width .25s cubic-bezier(.4,0,.2,1);overflow:hidden;box-shadow:3px 0 12px rgba(0,0,0,.25)}
#sidebar.collapsed{width:54px;min-width:54px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:54px;background:linear-gradient(135deg,var(--topbar-from) 0%,var(--topbar-to) 100%);display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 3px 10px rgba(26,86,219,.3);flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:18px}
#footer{background:var(--white);border-top:1px solid var(--border);text-align:center;padding:7px;font-size:11px;color:var(--muted);flex-shrink:0}
/* ── SIDEBAR BRAND ── */
.sb-brand{display:flex;align-items:center;gap:10px;padding:14px 14px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;color:#fff;font-size:12px;letter-spacing:-.5px;box-shadow:0 2px 8px rgba(37,99,235,.5)}
.sb-title{color:#fff;font-weight:700;font-size:13px;line-height:1.3;white-space:nowrap}
.sb-title span{color:#93c5fd;font-weight:400;font-size:11px}
/* ── SIDEBAR USER ── */
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.sb-uname{color:#fff;font-weight:600;font-size:13px;line-height:1.2;white-space:nowrap}
.sb-urole{color:#93c5fd;font-size:11px}
/* ── SIDEBAR NAV ── */
nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;color:#93c5fd;transition:all .15s;white-space:nowrap;user-select:none;border-left:3px solid transparent}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;border-left-color:#3b82f6}
.nav-item.active{background:var(--sidebar-active);color:#fff;border-left-color:#60a5fa}
.nav-item svg{flex-shrink:0;width:16px;height:16px}
.nav-label{flex:1;font-size:13px}
.nav-arrow{font-size:9px;transition:transform .2s;opacity:.7}
.nav-arrow.open{transform:rotate(90deg)}
.sub-item{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 38px;cursor:pointer;color:#64748b;transition:all .15s;white-space:nowrap;font-size:12px;border-left:3px solid transparent}
.sub-item:hover{background:var(--sidebar-hover);color:#fff;border-left-color:#60a5fa}
.sub-item.active{color:#60a5fa;font-weight:600}
.sub-dot{width:5px;height:5px;border-radius:50%;background:#475569;flex-shrink:0;transition:background .15s}
.sub-item:hover .sub-dot,.sub-item.active .sub-dot{background:#60a5fa}
.sb-logout{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;color:#93c5fd;border-top:1px solid rgba(255,255,255,.08);transition:all .15s}
.sb-logout:hover{color:#f87171;background:rgba(239,68,68,.08)}
/* ── TOPBAR ── */
.tb-left{display:flex;align-items:center;gap:10px}
.tb-ham{background:rgba(255,255,255,.15);border:none;color:#fff;cursor:pointer;padding:7px;border-radius:8px;display:flex;transition:background .15s}
.tb-ham:hover{background:rgba(255,255,255,.25)}
.tb-title{color:#fff;font-weight:700;font-size:15px;letter-spacing:.2px}
.tb-center{display:flex;align-items:center;gap:10px}
.tb-logo{background:rgba(255,255,255,.2);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:11px;border:2px solid rgba(255,255,255,.4)}
.tb-brand{color:#fff;font-weight:700;font-size:14px;letter-spacing:.5px}
.tb-brand span{color:#bfdbfe;font-weight:400;font-size:12px;margin-left:4px}
.tb-right{display:flex;align-items:center;gap:4px}
.tb-btn{background:rgba(255,255,255,.15);border:none;color:#fff;cursor:pointer;padding:7px 10px;border-radius:7px;display:flex;align-items:center;gap:4px;font-size:12px;font-family:inherit;transition:background .15s;font-weight:500}
.tb-btn:hover{background:rgba(255,255,255,.25)}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;outline:none;transition:all .15s;white-space:nowrap;font-family:inherit;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0)}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-warning{background:var(--orange);color:#fff}
.btn-secondary{background:var(--gray);color:#fff}
.btn-dark{background:#0f172a;color:#fff}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:#f8fafc}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:10px}
/* ── INPUTS ── */
.inp{width:100%;padding:7px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:all .15s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.inp::placeholder{color:#94a3b8}
select.inp{cursor:pointer}
textarea.inp{resize:none}
.inp-readonly{background:#f8fafc;color:var(--muted)}
/* ── LABELS ── */
.lbl{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:4px;letter-spacing:.2px}
/* ── CARDS ── */
.card{background:var(--surface);border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);padding:18px}
.page-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:2px}
.breadcrumb{font-size:11px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:5px}
.breadcrumb span{color:var(--text);font-weight:500}
/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--thead);color:#fff}
thead th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;white-space:nowrap;letter-spacing:.3px}
tbody tr:nth-child(even){background:var(--row-alt)}
tbody tr:nth-child(odd){background:#fff}
tbody tr:hover{background:var(--row-hover);transition:background .12s}
tbody td{padding:8px 12px;color:#475569;border-bottom:1px solid #f1f5f9;vertical-align:middle}
/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.3px}
.b-reg{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.b-samacc{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.b-tested{background:#fefce8;color:#a16207;border:1px solid #fde047}
.b-printed{background:#f0fdf4;color:#15803d;border:1px solid #86efac}
.b-dispatch{background:#faf5ff;color:#6d28d9;border:1px solid #c4b5fd}
.b-pending{background:#fff7ed;color:#c2410c;border:1px solid #fdba74}
.b-call{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;cursor:pointer}
/* ── TOGGLE ── */
.tog-wrap{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;cursor:pointer;user-select:none;color:var(--text)}
.tog{position:relative;width:36px;height:20px;cursor:pointer}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;border-radius:20px;background:#cbd5e1;transition:background .2s}
.tog-sl::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tog-sl{background:var(--accent)}
.tog input:checked+.tog-sl::before{transform:translateX(16px)}
/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.g5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:12px}
.g6{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:12px}
.mb1{margin-bottom:8px}.mb2{margin-bottom:14px}.mb3{margin-bottom:20px}
.flex{display:flex;align-items:center;gap:8px}
.flex-wrap{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
/* ── STAT CARDS ── */
.stat-card{background:#fff;border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 6px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);transition:transform .15s,box-shadow .15s;cursor:default}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-val{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
/* ── GRAPHICAL CARDS ── */
.gcard{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;background:#fff}
.gcard:hover{border-color:var(--accent);background:var(--row-alt);transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.12)}
.gcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:4px}
.gcard-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcard-tests{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,32,68,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-box{background:#fff;border-radius:14px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-height:90vh;display:flex;flex-direction:column}
.modal-sm{max-width:420px}.modal-md{max-width:580px}.modal-lg{max-width:800px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(135deg,var(--topbar-from),var(--topbar-to));border-radius:14px 14px 0 0}
.modal-title{color:#fff;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;padding:3px 8px;border-radius:6px;transition:background .15s}
.modal-close:hover{background:rgba(255,255,255,.35)}
.modal-body{padding:18px;overflow-y:auto;flex:1}
/* ── BILLING BOX ── */
.bill-box{background:linear-gradient(135deg,#eff6ff,#f0f9ff);border:1.5px solid #bfdbfe;border-radius:10px;padding:14px}
.bill-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bill-label{font-size:12px;color:var(--muted);font-weight:500}
.bill-val{font-size:15px;font-weight:700;color:var(--text)}
/* ── SEARCH DROP ── */
.search-wrap{position:relative}
.search-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--accent);border-radius:8px;box-shadow:0 8px 24px rgba(37,99,235,.15);z-index:100;max-height:200px;overflow-y:auto}
.search-drop-item{padding:9px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px;border-bottom:1px solid #f1f5f9;transition:background .1s}
.search-drop-item:hover{background:var(--row-alt)}
.search-drop-item:last-child{border:none}
/* ── RADIO ── */
.radio-group{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.radio-opt{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;font-weight:500}
.radio-opt input{accent-color:var(--accent);cursor:pointer;width:14px;height:14px}
/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;gap:4px;margin-top:14px;flex-wrap:wrap}
.pg-btn{padding:5px 11px;border:1.5px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:11px;font-family:inherit;color:var(--muted);transition:all .15s;font-weight:500}
.pg-btn:hover{background:var(--row-alt);border-color:var(--accent);color:var(--accent)}
.pg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
/* ── ACCENT STRIP ── */
.accent-strip{position:fixed;right:0;top:30%;display:flex;flex-direction:column;z-index:200;border-radius:6px 0 0 6px;overflow:hidden}
.accent-strip div{width:10px;height:28px;cursor:pointer;transition:width .2s}
.accent-strip div:hover{width:18px}
/* ── LOGIN ── */
#login-page{display:flex;height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2044 0%,#1a3460 40%,#1a56db 80%,#60a5fa 100%)}
#login-page::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.login-card{background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-radius:20px;box-shadow:0 32px 80px rgba(0,0,0,.35);width:380px;padding:40px;position:relative;z-index:1}
.login-logo{width:70px;height:70px;border-radius:18px;background:linear-gradient(135deg,#1a56db,#7c3aed);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:14px;font-weight:800;color:#fff;letter-spacing:-1px;box-shadow:0 8px 24px rgba(26,86,219,.4)}
.login-title{text-align:center;font-size:24px;font-weight:800;color:var(--text);margin-bottom:2px;letter-spacing:-.5px}
.login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:28px}
.login-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#94a3b8;font-size:11px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.login-copyright{text-align:center;font-size:11px;color:#94a3b8;margin-top:20px}
/* ── QUICK ACCESS ── */
.qa-link{display:block;border-radius:10px;padding:16px;text-align:center;font-weight:600;font-size:13px;color:#fff;cursor:pointer;transition:all .15s;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.qa-link:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
/* ── SECTION HEADERS ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--row-alt)}
.section-title{font-size:14px;font-weight:700;color:var(--text)}
/* ── MISC ── */
.text-link{color:var(--accent);cursor:pointer;font-weight:500;font-size:12px}
.text-link:hover{text-decoration:underline}
.text-red{color:var(--red)}
.fw{width:100%}
.text-right{text-align:right}
.mono{font-family:monospace;font-size:11px}
.hidden{display:none}
.trunc{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
hr.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.empty-state{text-align:center;padding:40px;color:#94a3b8;font-size:13px}
.sub-menu{display:none}.sub-menu.open{display:block}
.page{display:none}.page.active{display:block}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:#e0f2fe;color:#0369a1}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.animate-in{animation:fadeSlideIn .2s ease}
.info-chip{background:var(--row-alt);border:1px solid #bfdbfe;border-radius:6px;padding:8px 12px;font-size:12px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card animate-in">
    <div class="login-logo">MAT</div>
    <div class="login-title">MAT Global</div>
    <div class="login-sub">Laboratory Information System &nbsp;·&nbsp; v2.0</div>
    <div class="mb2">
      <label class="lbl">Username</label>
      <input class="inp" id="login-user" placeholder="Enter your username" value="admin" autocomplete="username"/>
    </div>
    <div class="mb2">
      <label class="lbl">Password</label>
      <div class="flex">
        <input class="inp" id="login-pass" type="password" placeholder="Enter your password" value="admin123" autocomplete="current-password" style="flex:1"/>
        <button onclick="togglePassVis()" style="background:none;border:none;cursor:pointer;color:#94a3b8;padding:0 4px;font-size:16px" id="eye-btn">👁</button>
      </div>
    </div>
    <button class="btn btn-primary fw" style="padding:11px;font-size:14px;justify-content:center;border-radius:9px;margin-top:4px" onclick="doLogin()">Sign In to LIS</button>
    <div class="login-copyright">© 2024 MAT Global · All rights reserved</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="accent-strip">
    <div style="background:#dc2626"></div>
    <div style="background:#db2777"></div>
    <div style="background:#7c3aed"></div>
    <div style="background:#16a34a"></div>
    <div style="background:#ea580c"></div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">MAT</div>
      <div class="sb-title">MAT Global<br><span>Laboratory IS</span></div>
    </div>
    <div class="sb-user">
      <div class="sb-avatar" id="sb-av">A</div>
      <div>
        <div class="sb-uname" id="sb-uname">Admin</div>
        <div class="sb-urole" id="sb-urole">Administrator</div>
      </div>
    </div>
    <nav id="sb-nav"></nav>
    <div class="sb-logout" onclick="doLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      <span class="nav-label">Sign Out</span>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="tb-left">
        <button class="tb-ham" onclick="toggleSidebar()">

function showToast(msg,type='success'){
  const t=document.createElement('div');
  const bg={success:'#16a34a',error:'#dc2626',warn:'#ea580c',info:'#1d4ed8'}[type]||'#16a34a';
  t.style.cssText=`position:fixed;bottom:24px;right:24px;background:${bg};color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.2);animation:fadeSlideIn .3s`;
  t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}
function pager(cur,total){
  if(total<=1) return '';
  return `<div class="pagination">${cur>1?`<button class="pg-btn" onclick="showToast('Page ${cur-1}','info')">‹ Prev</button>`:''}`+
  Array.from({length:total},(_,i)=>`<button class="pg-btn${i+1===cur?' active':''}" onclick="showToast('Page ${i+1}','info')">${i+1}</button>`).join('')+
  (cur<total?`<button class="pg-btn" onclick="showToast('Page ${cur+1}','info')">Next ›</button>`:'')+`</div>`;
}

function searchPatient(){
  const mobile=document.getElementById('reg-mob-search')?.value.trim();
  if(!mobile){showToast('Enter mobile number','warn');return;}
  const p=patients.find(x=>x.mobile===mobile);
  if(p){
    document.getElementById('reg-name').value=p.name;
    document.getElementById('reg-gender').value=p.gender;
    document.getElementById('reg-age').value=p.age;
    document.getElementById('reg-mob').value=p.mobile;
    if(document.getElementById('reg-address')) document.getElementById('reg-address').value=p.address||'';
    showToast('Patient found: '+p.name,'info');
  } else showToast('No patient with this mobile','warn');
}

function searchTests(val){
  const drop=document.getElementById('test-drop');
  if(!val){drop.classList.add('hidden');return;}
  const res=testCatalog.filter(t=>t.name.toLowerCase().includes(val.toLowerCase())||t.code.toLowerCase().includes(val.toLowerCase()));
  if(!res.length){drop.classList.add('hidden');return;}
  drop.innerHTML=res.map(t=>`<div class="search-drop-item" onclick="addTest(${t.id})"><span>${t.name}</span><span style="color:var(--muted);font-size:11px">${t.code} · ₹${fmt(t.rate)}</span></div>`).join('');
  drop.classList.remove('hidden');
}

function addTest(id){
  const t=testCatalog.find(x=>x.id===id);
  if(!t||selectedTests.find(x=>x.id===id)){showToast('Already added','warn');return;}
  selectedTests.push(t);
  document.getElementById('test-inp').value='';
  document.getElementById('test-drop').classList.add('hidden');
  updateTestsTable();recalcBill();
}

function removeTest(id){selectedTests=selectedTests.filter(t=>t.id!==id);updateTestsTable();recalcBill();}

function updateTestsTable(){
  const tbody=document.getElementById('sel-tests');
  if(!tbody)return;
  if(!selectedTests.length){tbody.innerHTML='<tr><td colspan="5" class="empty-state" style="padding:28px">Search &amp; add tests above</td></tr>';return;}
  tbody.innerHTML=selectedTests.map(t=>`<tr>
    <td class="mono">${t.code}</td><td>${t.name}</td><td><span class="tag">${t.type}</span></td>
    <td class="text-right">₹${fmt(t.rate)}</td>
    <td><span style="color:var(--red);cursor:pointer;font-size:18px;line-height:1" onclick="removeTest(${t.id})" title="Remove">×</span></td>
  </tr>`).join('');
}

function recalcBill(){
  const total=selectedTests.reduce((s,t)=>s+(t.rate||0),0);
  const other=parseFloat(document.getElementById('bill-other')?.value||0);
  const disc=parseFloat(document.getElementById('bill-disc')?.value||0);
  const paid=parseFloat(document.getElementById('bill-paid')?.value||0);
  const discType=document.querySelector('input[name="disctype"]:checked')?.value||'Amt';
  const discAmt=discType==='Per%'?(total*disc/100):disc;
  const afterDisc=total+other-discAmt;
  const balance=afterDisc-paid;
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('bill-total','₹ '+fmt(total));
  set('bill-afterdisc','₹ '+fmt(afterDisc));
  set('bill-balance','₹ '+fmt(Math.max(0,balance)));
}

function saveRegistration(){
  const name=document.getElementById('reg-name')?.value.trim();
  if(!name){showToast('Patient name required','error');return;}
  if(!selectedTests.length){showToast('Add at least one test','error');return;}
  const mobile=document.getElementById('reg-mob')?.value.trim();
  const total=selectedTests.reduce((s,t)=>s+(t.rate||0),0);
  const paid=parseFloat(document.getElementById('bill-paid')?.value||0);
  const rec={
    id:Date.now(),regNo:String(regNextNum++),
    name,gender:document.getElementById('reg-gender')?.value||'Male',
    age:document.getElementById('reg-age')?.value||'',ageUnit:document.getElementById('reg-ageunit')?.value||'Years',
    mobile,email:document.getElementById('reg-email')?.value||'',
    address:document.getElementById('reg-address')?.value||'',
    center:document.getElementById('reg-ptype')?.value||'OPD',
    refDoc:refDoctors.find(d=>d.id==document.getElementById('reg-refdoc')?.value)?.name||'',
    tests:selectedTests.map(t=>t.name).join(', '),
    charges:total,paid,balance:Math.max(0,total-paid),status:'Reg',
    createdAt:new Date().toLocaleString(),
  };
  patients.unshift(rec);
  showToast(`✅ Registered! Reg No: ${rec.regNo}`,'success');
  navigate('new-registration');
}

function renderPSRows(list){

    <td class="text-right">₹${fmt(p.balance||0)}</td>

function changePatientStatus(id){
  const statuses=['Reg','SamCollect','SamAccept','SamReject','Tested','Authorized','Completed','Dispatch'];
  const p=patients.find(x=>x.id===id);
  if(!p) return;
  const idx=statuses.indexOf(p.status||'Reg');
  p.status=statuses[(idx+1)%statuses.length];
  filterPS();
}

function filterPS(){
  const name=document.getElementById('ps-name')?.value.toLowerCase();
  const mob=document.getElementById('ps-mob')?.value;
  const reg=document.getElementById('ps-regno')?.value;

  if(name) list=list.filter(p=>p.name.toLowerCase().includes(name));

  if(reg) list=list.filter(p=>p.regNo.includes(reg));
  const tbody=document.getElementById('ps-tbody');
  const ct=document.getElementById('ps-count');
  if(tbody) tbody.innerHTML=renderPSRows(list);
  if(ct) ct.textContent=list.length;
}

function renderAuthorizeReport(){
  const testedPatients = patients.filter(p => p.status === 'Tested');

    <div style="margin-bottom:20px">
      <p>Authorize test results for patients. Select a doctor for each test result before authorizing.</p>

    ${testedPatients.length === 0 ? '<div class="empty-state" style="padding:30px">No patients with tested results found</div>' :
    testedPatients.map(p => `
      <div class="card" style="margin-bottom:15px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <h3 style="margin:0">${p.name} (Reg: ${p.regNo})</h3>
          <span class="badge badge-warning">${p.status}</span>
        </div>
        <div style="margin-bottom:10px">
          <strong>Tests:</strong> ${p.tests}
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:#f5f5f5">
              <th style="padding:8px;text-align:left;border:1px solid #ddd">Test Name</th>
              <th style="padding:8px;text-align:left;border:1px solid #ddd">Result</th>
              <th style="padding:8px;text-align:left;border:1px solid #ddd">Doctor</th>
              <th style="padding:8px;text-align:center;border:1px solid #ddd">Authorize</th>
            </tr>
          </thead>
          <tbody>
            ${(p.tests || '').split(',').map(test => `
              <tr>
                <td style="padding:8px;border:1px solid #ddd">${test.trim()}</td>
                <td style="padding:8px;border:1px solid #ddd">
                  <input type="text" class="inp" placeholder="Enter result" style="width:100%"/>
                </td>
                <td style="padding:8px;border:1px solid #ddd">
                  <select class="inp" style="width:100%">
                    <option>Select Doctor</option>
                    <option>Dr. Smith</option>
                    <option>Dr. Johnson</option>
                    <option>Dr. Williams</option>
                  </select>
                </td>
                <td style="padding:8px;text-align:center;border:1px solid #ddd">
                  <button class="btn btn-success btn-xs" onclick="authorizeTest('${p.id}', '${test.trim()}')">✓ Authorize</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div style="margin-top:10px;text-align:right">
          <button class="btn btn-primary" onclick="authorizeAll('${p.id}')">Authorize All Tests</button>
        </div>
      </div>
    `).join('')}
  </div>`;
}

// ════════════════════════════════════════════════════════
//  USER MANAGEMENT
// ════════════════════════════════════════════════════════
function renderUserManagement(){
  return `
  <h1 class="page-title">User Management</h1>
  ${bc('Home','User Management')}
  <div class="card">
    <div class="flex-wrap mb3">
      <input class="inp" id="um-search" placeholder="Search users..." style="width:260px"/>
      <button class="btn btn-primary" onclick="filterUM()">Search</button>
      <button class="btn btn-success" style="margin-left:auto" onclick="openUMModal(null)">+ Add User</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>Username</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="um-tbody">${renderUMRows(users)}</tbody>
      </table>
    </div>
    ${pager(1,1)}
  </div>`;
}
const ROLE_COLORS={ADMIN:'#dc2626',DOCTOR:'#1d4ed8',LAB_TECHNICIAN:'#16a34a',RECEPTIONIST:'#ca8a04'};
function renderUMRows(list){
  return list.map((u,i)=>`<tr>
    <td>${i+1}</td><td class="mono">${u.username}</td>
    <td style="font-weight:600">${u.name}</td><td>${u.email}</td>
    <td><span class="badge" style="background:${ROLE_COLORS[u.role]||'#64748b'}22;color:${ROLE_COLORS[u.role]||'#64748b'};border-color:${ROLE_COLORS[u.role]||'#64748b'}44">${u.role}</span></td>
    <td><span class="badge" style="background:${u.active?'#f0fdf4':'#fef2f2'};color:${u.active?'#15803d':'#dc2626'};border-color:${u.active?'#86efac':'#fecaca'}">${u.active?'Active':'Inactive'}</span></td>
    <td><div class="flex"><button class="btn btn-primary btn-xs" onclick="openUMModal(${u.id})">✏️ Edit</button><button class="btn btn-danger btn-xs" onclick="deleteUM(${u.id})">🗑</button></div></td>
  </tr>`).join('');
}
function filterUM(){
  const s=document.getElementById('um-search')?.value.toLowerCase();
  const res=s?users.filter(u=>u.name.toLowerCase().includes(s)||u.username.toLowerCase().includes(s)):users;
  const t=document.getElementById('um-tbody');if(t)t.innerHTML=renderUMRows(res);
}
function openUMModal(id){
  const u=id?users.find(x=>x.id===id):null;
  const [fn='',ln='']=(u?.name||'').split(' ');
  showModal(`
    <div class="g2 mb2">
      <div><label class="lbl">First Name</label><input class="inp" id="um-fn" value="${fn}"/></div>
      <div><label class="lbl">Last Name</label><input class="inp" id="um-ln" value="${ln||''}"/></div>
    </div>
    <div class="g2 mb2">
      <div><label class="lbl">Username *</label><input class="inp" id="um-user" value="${u?.username||''}"/></div>
      <div><label class="lbl">Email *</label><input class="inp" id="um-email" type="email" value="${u?.email||''}"/></div>
    </div>
    <div class="g2 mb2">
      <div><label class="lbl">${u?'New Password (blank = no change)':'Password *'}</label><input class="inp" id="um-pass" type="password" placeholder="Password"/></div>
      <div><label class="lbl">Role</label><select class="inp" id="um-role">
        <option value="ADMIN" ${u?.role==='ADMIN'?'selected':''}>Admin</option>
        <option value="DOCTOR" ${u?.role==='DOCTOR'?'selected':''}>Doctor</option>
        <option value="LAB_TECHNICIAN" ${u?.role==='LAB_TECHNICIAN'?'selected':''}>Lab Technician</option>
        <option value="RECEPTIONIST" ${u?.role==='RECEPTIONIST'?'selected':''}>Receptionist</option>
      </select></div>
    </div>
    <div class="text-right"><button class="btn btn-outline" onclick="closeModal()" style="margin-right:8px">Cancel</button><button class="btn btn-success" onclick="saveUM(${id||'null'})">Save User</button></div>
  `,u?'Edit User':'Add New User','modal-md');
}
function saveUM(id){
  const fn=document.getElementById('um-fn')?.value.trim();
  const ln=document.getElementById('um-ln')?.value.trim();
  const username=document.getElementById('um-user')?.value.trim();
  const email=document.getElementById('um-email')?.value.trim();
  const role=document.getElementById('um-role')?.value;
  if(!username||!email){showToast('Username & email required','error');return;}
  if(id){const u=users.find(x=>x.id===id);if(u){u.name=`${fn} ${ln}`.trim();u.username=username;u.email=email;u.role=role;}showToast('User updated!');}
  else{users.push({id:Date.now(),username,name:`${fn} ${ln}`.trim(),email,role,active:true});showToast('User created!');}
  closeModal();navigate('user-management');
}
function deleteUM(id){if(!confirm('Delete this user?'))return;users=users.filter(u=>u.id!==id);showToast('Deleted!');navigate('user-management');}

// ════════════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════════════
function showModal(body,title,size='modal-md'){
  const r=document.getElementById('modal-root');
  r.style.display='flex';
  r.innerHTML=`<div class="modal-box ${size}" onclick="event.stopPropagation()">
    <div class="modal-head"><span class="modal-title">${title}</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${body}</div>
  </div>`;
}
function closeModal(){const r=document.getElementById('modal-root');r.style.display='none';r.innerHTML='';}
function closeModalOnOverlay(e){if(e.target===document.getElementById('modal-root'))closeModal();}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.querySelectorAll('.search-drop').forEach(d=>d.classList.add('hidden'));});
</script>
</body>
</html>
